<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKP Restaurante · The Menu / La Carta</title>
<link rel="stylesheet" href="assets/skp.css">
<style>
.wrap{max-width:1180px;margin:0 auto;padding:0 40px}

/* header */
.nav{position:sticky;top:0;z-index:50;background:rgba(15,11,8,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line-soft)}
.nav-in{max-width:1180px;margin:0 auto;padding:14px 40px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.nav-logo{display:flex;align-items:center;gap:11px}
.nav-logo img{height:40px}
.nav-logo b{font-family:var(--f-brand);font-weight:600;color:var(--gold-bright);letter-spacing:.14em;font-size:1rem}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-back{font-family:var(--f-mono);font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);transition:.2s}
.nav-back:hover{color:var(--gold-bright)}

/* category strip */
.catbar{position:sticky;top:69px;z-index:40;background:rgba(20,15,11,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line-soft);overflow-x:auto}
.catbar-in{max-width:1180px;margin:0 auto;padding:0 40px;display:flex;gap:4px;white-space:nowrap}
.catbar a{font-family:var(--f-mono);font-size:.66rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:14px 14px;transition:.2s;border-bottom:2px solid transparent}
.catbar a:hover{color:var(--gold-bright);border-bottom-color:var(--gold)}

/* hero */
.menu-hero{position:relative;text-align:center;padding:80px 40px 64px;overflow:hidden;border-bottom:1px solid var(--line-soft)}
.menu-hero .bg{position:absolute;inset:0;background:
  radial-gradient(ellipse at 50% 0%,rgba(201,162,78,.08),transparent 60%),
  repeating-linear-gradient(135deg,#17110b 0,#17110b 16px,#1c140e 16px,#1c140e 32px)}
.menu-hero .in{position:relative}
.menu-hero img{height:74px;margin:0 auto 24px}
.menu-hero h1{font-family:var(--f-display);font-size:clamp(2.6rem,6vw,4.6rem);color:var(--cream)}
.menu-hero .eyebrow{margin-bottom:14px}
.menu-hero p{margin:18px auto 0;max-width:560px;color:var(--muted);font-size:1.02rem}

/* legend */
.legend{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 22px;padding:22px 40px;background:var(--char);border-bottom:1px solid var(--line-soft)}
.legend .li{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--smoke)}
.legend .sym{font-size:1rem;width:1.4em;text-align:center}

/* section */
.msec{padding:64px 0 12px;border-bottom:1px solid var(--line-soft)}
.msec-head{display:grid;grid-template-columns:auto 1fr;align-items:baseline;column-gap:18px;margin-bottom:8px}
.msec-head .k{font-family:var(--f-mono);font-size:.8rem;color:var(--gold-deep)}
.msec-head h2{font-family:var(--f-display);font-size:clamp(2rem,3.4vw,2.8rem);color:var(--cream)}
.msec-note{color:var(--muted);font-size:.96rem;font-style:italic;margin:0 0 28px;font-family:var(--f-display);font-size:1.1rem}
.mcols{display:grid;grid-template-columns:1fr 1fr;gap:0 64px}
@media(max-width:760px){.mcols{grid-template-columns:1fr}}
.mcol{min-width:0}

.m-item{padding:14px 0;border-bottom:1px solid var(--line-soft)}
.m-head{display:grid;grid-template-columns:1fr auto;align-items:baseline;column-gap:16px}
.m-name{font-family:var(--f-display);font-size:1.3rem;color:var(--cream);font-weight:500;min-width:0;line-height:1.2}
.m-tags{display:inline-flex;gap:5px;margin-left:7px;vertical-align:baseline}
.m-tags .t{font-size:.82rem;line-height:1}
.t.rec{color:var(--gold-bright)} .t.stone{color:var(--gold-bright)} .t.spicy{color:#E89A8E} .t.veg{color:#9FC08B}
.m-price{font-family:var(--f-display);font-weight:600;font-size:1.28rem;color:var(--gold-bright);white-space:nowrap}
.m-desc{color:var(--muted);font-size:.92rem;margin-top:4px;max-width:90%}
.m-alg{margin-top:5px}

/* inline (sauces/coffee/drinks) */
.minline{display:grid;grid-template-columns:repeat(3,1fr);gap:4px 40px}
@media(max-width:760px){.minline{grid-template-columns:1fr}}
.mi{display:grid;grid-template-columns:1fr auto;align-items:baseline;column-gap:12px;padding:11px 0;border-bottom:1px solid var(--line-soft)}
.mi .n{font-family:var(--f-display);font-size:1.12rem;color:var(--cream);line-height:1.2}
.mi .p{font-family:var(--f-display);color:var(--gold-bright);font-weight:600;white-space:nowrap}
.mi-desc{grid-column:1/-1;font-size:.82rem;color:var(--muted);margin-top:3px}

/* featured stone */
.featured{position:relative;background:var(--char);border-top:2px solid var(--gold-deep);border-bottom:2px solid var(--gold-deep);margin:0;padding:0;overflow:hidden}
.featured .watermark{position:absolute;right:-40px;top:50%;transform:translateY(-50%);width:480px;opacity:.05;pointer-events:none}
.featured .wrap{position:relative;padding-top:70px;padding-bottom:30px}
.featured .msec-head h2{font-size:clamp(2.4rem,4vw,3.4rem)}
.featured .m-name{font-size:1.5rem}
.featured .m-price{font-size:1.5rem}
.featured .m-item{padding:18px 0;border-color:rgba(201,162,78,.16)}

/* wine columns */
.wgroups{display:grid;grid-template-columns:1fr 1fr;gap:0 64px}
@media(max-width:760px){.wgroups{grid-template-columns:1fr}}
.wgroup h3{font-family:var(--f-display);font-size:1.5rem;color:var(--gold);margin:8px 0 14px}

/* daily menu */
.daily{background:
  linear-gradient(rgba(15,11,8,.86),rgba(15,11,8,.94)),
  repeating-linear-gradient(135deg,#1b130d 0,#1b130d 13px,#20160f 13px,#20160f 26px);
  border-top:1px solid var(--line-soft)}
.daily .wrap{padding:80px 40px}
.daily-head{text-align:center;margin-bottom:46px}
.daily-head .price{font-family:var(--f-display);font-size:3.4rem;color:var(--gold-bright);font-weight:600;line-height:1}
.daily-head h2{font-family:var(--f-display);font-size:2.4rem;margin-top:6px}
.daily-head p{color:var(--muted);margin-top:10px}
.daily-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--line-soft);border:1px solid var(--line-soft)}
@media(max-width:760px){.daily-cols{grid-template-columns:1fr}}
.daily-col{background:var(--ink);padding:32px}
.daily-col h4{font-family:var(--f-mono);font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
.daily-col li{list-style:none;font-family:var(--f-display);font-size:1.12rem;color:var(--smoke);padding:7px 0}
.daily-col ul{margin:0;padding:0}

/* cta */
.menu-cta{text-align:center;padding:74px 40px}
.menu-cta h2{font-family:var(--f-display);font-size:clamp(2rem,4vw,3rem);margin-bottom:10px}
.menu-cta p{color:var(--muted);margin-bottom:28px}

footer{background:var(--char);border-top:1px solid var(--line-soft);padding:40px;text-align:center}
footer img{height:96px;margin:0 auto 14px}
footer .fb{font-family:var(--f-mono);font-size:.66rem;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}

@media(max-width:760px){
  .wrap,.nav-in,.catbar-in{padding-left:16px;padding-right:16px}
  /* Compact nav */
  .nav-logo img{height:32px}
  .nav-logo b{font-size:.85rem}
  .nav-in{padding:11px 16px;gap:10px}
  .nav-right{gap:10px}
  .nav-back{font-size:.6rem;letter-spacing:.08em}
  /* Sticky catbar offset to match compacted nav (~54px) */
  .catbar{top:54px;-webkit-overflow-scrolling:touch}
  .catbar a{padding:12px 10px;font-size:.6rem;letter-spacing:.07em}
  /* Hero */
  .menu-hero{padding:56px 20px 44px}
  .menu-hero img{height:56px}
  /* Legend — 2 per row */
  .legend{padding:16px 20px;gap:8px 16px}
  .legend .li{font-size:.78rem}
  /* Sections */
  .msec{padding:44px 0 8px}
  .msec-head{column-gap:10px}
  .msec-head h2{font-size:clamp(1.7rem,6vw,2.4rem)}
  .msec-note{font-size:.96rem;margin-bottom:20px}
  /* Item layout — align price to top so it never clashes with wrapped name */
  .m-head{align-items:start;column-gap:12px}
  .m-name{font-size:1.15rem}
  .m-price{font-size:1.12rem;padding-top:3px}
  /* Featured section */
  .featured .wrap{padding-top:48px;padding-bottom:16px}
  .featured .m-name{font-size:1.25rem}
  .featured .m-price{font-size:1.25rem}
  .featured .watermark{width:260px;right:-20px}
  /* Inline items (sauces, coffee, drinks) — 2 cols */
  .minline{grid-template-columns:1fr 1fr;gap:0 24px}
  /* Wine groups */
  .wgroup h3{font-size:1.25rem}
  /* Daily menu */
  .daily .wrap{padding:48px 20px}
  .daily-head .price{font-size:2.6rem}
  .daily-head h2{font-size:1.9rem}
  .daily-col{padding:24px 20px}
  /* CTA */
  .menu-cta{padding:52px 20px}
  .menu-cta .btn{width:100%;justify-content:center}
  /* Footer */
  footer{padding:32px 20px}
  footer img{height:72px}
  /* Scroll anchor offset for sticky nav+catbar (~104px total) */
  [id^="sec-"],[id="daily-sec"]{scroll-margin-top:110px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-in">
    <a class="nav-logo" href="SKP Homepage.html"><img src="assets/skp-bull.png" alt="SKP"><b>SKP</b></a>
    <div class="nav-right">
      <a class="nav-back" href="SKP Homepage.html" data-es="← Inicio">← Home</a>
      <div class="lang-pick">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="es">ES</button>
      </div>
      <a href="SKP Homepage.html#reserve" class="btn btn-gold" data-es="Reservar">Reserve</a>
    </div>
  </div>
</nav>

<div class="catbar"><div class="catbar-in" id="catbar"></div></div>

<header class="menu-hero">
  <div class="bg"></div>
  <div class="in">
    <img src="assets/skp-lockup.png" alt="SKP Restaurante">
    <div class="eyebrow" data-es="Steakhouse · Parrilla · Cocina Internacional">Steakhouse · Grill · International Kitchen</div>
    <h1 data-es="La Carta">The Menu</h1>
    <p data-es="Carne a la piedra, brasa y cocina del mundo. Todos los precios incluyen IVA.">Meat on the stone, fire and a world kitchen. All prices include VAT.</p>
  </div>
</header>

<div class="legend" id="legend"></div>

<main id="menu"></main>

<section class="daily"><div class="wrap" id="daily"></div></section>

<section class="menu-cta">
  <div class="eyebrow" data-es="¿Listo?">Ready?</div>
  <h2 data-es="Reserva tu mesa a la piedra">Reserve your stone-side table</h2>
  <p data-es="Te guardamos sitio junto a la brasa.">We'll keep a place by the fire.</p>
  <a href="SKP Homepage.html#reserve" class="btn btn-gold" data-es="Reservar ahora">Reserve now</a>
</section>

<footer>
  <img src="assets/skp-lockup.png" alt="SKP Restaurante">
  <div class="fb">© 2026 SKP Restaurante · Carne a la Piedra</div>
</footer>

<script src="assets/menu-data.js"></script>
<script>
var KEY='skp-lang';
function lget(){try{return localStorage.getItem(KEY)||'en'}catch(e){return 'en'}}
var L=lget();
function t(o,base){ return L==='es' ? (o[base+'_es']||o['es']||o[base]||o['en']) : (o[base]||o['en']); }
function field(o,en,es){ return L==='es' ? (o[es]||o[en]) : o[en]; }
var SYM={rec:'◆',stone:'♨',spicy:'▲',veg:'❋'};

function tagHTML(tags){ if(!tags)return''; return '<span class="m-tags">'+tags.map(function(x){return '<span class="t '+x+'">'+SYM[x]+'</span>';}).join('')+'</span>'; }

function itemHTML(it){
  var name=field(it,'en','es');
  var desc=field(it,'de','ds');
  var h='<div class="m-item"><div class="m-head"><span class="m-name">'+name+tagHTML(it.tags)+'</span><span class="m-price">'+it.p+'</span></div>';
  if(desc) h+='<div class="m-desc">'+desc+'</div>';
  if(it.alg) h+='<div class="m-alg"><span class="alg">'+(L==='es'?'alérgenos: ':'allergens: ')+it.alg+'</span></div>';
  h+='</div>'; return h;
}
function twoCol(items){
  var half=Math.ceil(items.length/2);
  return '<div class="mcols"><div class="mcol">'+items.slice(0,half).map(itemHTML).join('')+'</div><div class="mcol">'+items.slice(half).map(itemHTML).join('')+'</div></div>';
}
function inlineHTML(it){
  var desc=field(it,'de','ds');
  return '<div class="mi"><span class="n">'+field(it,'en','es')+'</span><span class="p">'+it.p+'</span>'+(desc?'<div class="mi-desc">'+desc+'</div>':'')+'</div>';
}

function render(){
  L=lget();
  var M=window.SKP_MENU;
  // legend
  document.getElementById('legend').innerHTML = M.legend.map(function(l){
    return '<div class="li"><span class="sym '+l.cls+'" style="color:var(--gold-bright)">'+l.sym+'</span>'+field(l,'en','es')+'</div>';
  }).join('');
  // catbar
  document.getElementById('catbar').innerHTML = M.sections.map(function(s){
    return '<a href="#sec-'+s.id+'">'+field(s,'en','es')+'</a>';
  }).join('') + '<a href="#daily-sec">'+ (L==='es'?'Menú Diario':'Daily Menu') +'</a>';
  // sections
  var out='';
  M.sections.forEach(function(s){
    var featured = s.featured?' featured':'';
    var headHTML='<div class="msec-head"><span class="k">'+s.kicker+'</span><h2>'+field(s,'en','es')+'</h2></div>';
    var note = (L==='es'? s.note_es : s.note_en);
    var noteHTML = note? '<p class="msec-note">'+note+'</p>':'';
    var body='';
    if(s.columns && s.groups){
      body='<div class="wgroups">'+s.groups.map(function(g){
        return '<div class="wgroup"><h3>'+field(g,'en','es')+'</h3>'+g.items.map(itemHTML).join('')+'</div>';
      }).join('')+'</div>';
    } else if(s.inline){
      body='<div class="minline">'+s.items.map(inlineHTML).join('')+'</div>';
    } else {
      body=twoCol(s.items);
    }
    if(s.featured){
      out+='<section class="msec featured" id="sec-'+s.id+'"><img class="watermark" src="assets/skp-bull.png" alt=""><div class="wrap">'+headHTML+noteHTML+body+'</div></section>';
    } else {
      out+='<section class="msec" id="sec-'+s.id+'"><div class="wrap">'+headHTML+noteHTML+body+'</div></section>';
    }
  });
  document.getElementById('menu').innerHTML=out;
  // daily
  var d=M.daily;
  document.getElementById('daily').setAttribute('id','daily');
  document.getElementById('daily').innerHTML =
    '<a id="daily-sec"></a><div class="daily-head"><div class="price">'+d.price+'</div><h2>'+field(d,'en','es')+'</h2><p>'+ (L==='es'?d.sub_es:d.sub_en) +'</p></div>'+
    '<div class="daily-cols">'+d.cols.map(function(c){
      var items=(L==='es'?c.items_es:c.items);
      return '<div class="daily-col"><h4>'+field(c,'en','es')+'</h4><ul>'+items.map(function(i){return '<li>'+i+'</li>';}).join('')+'</ul></div>';
    }).join('')+'</div>';
  // static chrome data-es swaps
  document.querySelectorAll('[data-es]').forEach(function(el){
    if(!el.hasAttribute('data-en')) el.setAttribute('data-en', el.textContent);
    el.textContent = L==='es'? el.getAttribute('data-es') : el.getAttribute('data-en');
  });
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.setAttribute('aria-pressed', String(b.dataset.lang===L)); });
}
function setLang(l){ try{localStorage.setItem(KEY,l)}catch(e){} render(); }
document.querySelectorAll('.lang-btn').forEach(function(b){ b.addEventListener('click',function(){setLang(b.dataset.lang)}); });
render();
</script>
</body>
</html>
